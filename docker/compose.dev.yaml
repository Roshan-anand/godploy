services:
  server:
    build:
      context: ../apps/server
      dockerfile: Dockerfile.dev
      target: backend-dev
    image: hasu-backend-dev
    container_name: hasu-backend-dev
    develop:
      watch:
        - action: sync
          path: ../apps/server
          target: /app/server
          initial_sync: true
          ignore:
            - bin
            - data
        - action: rebuild
          path: ../apps/server/go.mod
        - action: rebuild
          path: ../apps/server/go.sum
        - action: rebuild
          path: ../apps/server/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../apps/server/.env:/app/server/.env:rw
      - hasu-dev-data:/app/server/data/sqlite
      - hasu-dev-logs:/app/server/data/badger
      - hasu-dev-codebase:/etc/hasu/code
    environment:
      - JWT_SECRET=red_balloon
      - APP_ENV=development
      - WEB_URL=http://localhost:3000
    ports:
      - "8080:8080"
    working_dir: /app/server
    restart: unless-stopped
    networks:
      - hasu-dev

networks:
  hasu-dev:
    attachable: true

volumes:
  hasu-dev-data:
    name: hasu-dev-data
  hasu-dev-logs:
    name: hasu-dev-logs
  hasu-dev-codebase:
    name: hasu-dev-codebase
